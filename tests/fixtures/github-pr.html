<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Compare &middot; example/repo</title>
</head>
<body>
  <!-- Minimal stand-in for GitHub's PR compare form. The content script looks for
       input[name="pull_request[title]"] and textarea[name="pull_request[body]"]. -->
  <form>
    <text-expander>
      <input name="pull_request[title]" type="text" />
    </text-expander>
    <textarea name="pull_request[body]"></textarea>
  </form>
</body>
</html>
